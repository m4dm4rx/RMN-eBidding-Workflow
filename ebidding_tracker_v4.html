
<style>
*{box-sizing:border-box;margin:0;padding:0}
.tr{padding:.8rem 0;font-size:13px;color:var(--color-text-primary)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.7rem 1rem;text-align:center}
.kpi-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:500}
.filter-row{display:flex;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.filter-row input{flex:1;min-width:140px}
.pill{padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:12px}
.pill.active{background:var(--color-text-primary);color:var(--color-background-primary)}
.tbl-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:auto;max-height:500px}
table{width:100%;border-collapse:collapse;min-width:860px}
th{font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;background:var(--color-background-secondary);text-align:left;white-space:nowrap}
td{padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.win{background:var(--color-background-success);color:var(--color-text-success)}
.contract{background:#e8f5e9;color:#2e7d32}
.lose{background:var(--color-background-danger);color:var(--color-text-danger)}
.pending{background:var(--color-background-warning);color:var(--color-text-warning)}
.approved{background:#e3f2fd;color:#1565c0}
.note{font-size:11px;color:var(--color-text-tertiary);margin-top:.4rem}
</style>

  {id:'69049240922',date:'2569-05-11',agency:'ทต.ซำสูง',province:'ขอนแก่น',budget:1223000,bid:728000,entity:'ห้างหุ้นส่วน RMN',status:'lose',lowest:627000},
  {id:'69049434789',date:'2569-05-11',agency:'แขวงฯ ร้อยเอ็ด',province:'ร้อยเอ็ด',budget:3901280,bid:2548000,entity:'ห้างหุ้นส่วน RMN',status:'win',lowest:2548000},
  {id:'69049160627',date:'2569-05-12',agency:'ทม.บ้านทุ่ม',province:'ขอนแก่น',budget:4625455,bid:2998000,entity:'ห้างหุ้นส่วน RMN',status:'win',lowest:2998000},
];

// Apply API_LOOKUP to fill missing budget/bid
const bids = SEED.map(b=>{
  const api = API_LOOKUP[b.id];
  if(api){
    return {...b, budget: b.budget||api.budget, bid: b.bid||api.bid};
  }
  return b;
});

const STATUS_LABEL={
  win:'<span class="badge win">ชนะ</span>',
  lose:'<span class="badge lose">แพ้</span>',
  contract:'<span class="badge contract">สัญญา</span>',
  approved:'<span class="badge approved">ประกาศผู้ชนะ</span>',
  pending:'<span class="badge pending">รอผล</span>',
};

let filter='all';

function fmt(n){return n?Math.round(n).toLocaleString('th-TH'):'-';}
function pct(b,bg){return (b&&bg)?Math.round((1-b/bg)*100)+'%':'-';}
function dateDisplay(d){
  if(!d)return'-';
  const [y,m,day]=d.split('-');
  const months=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(day)} ${months[parseInt(m)]}`;
}

function init(){
  const app=document.getElementById('app');
  const win=bids.filter(b=>['win','contract','approved'].includes(b.status));
  const lose=bids.filter(b=>b.status==='lose');
  const pending=bids.filter(b=>b.status==='pending');
  const winVal=win.reduce((s,b)=>s+b.bid,0);
  const winRate=bids.length?Math.round(win.length/bids.length*100):0;

  app.innerHTML=`
<div class="kpi-grid">
  <div class="kpi"><div class="kpi-label">โครงการทั้งหมด</div><div class="kpi-val">${bids.length}</div></div>
  <div class="kpi"><div class="kpi-label">ชนะ/สัญญา</div><div class="kpi-val" style="color:var(--color-text-success)">${win.length} (${winRate}%)</div></div>
  <div class="kpi"><div class="kpi-label">แพ้ / รอผล</div><div class="kpi-val" style="color:var(--color-text-danger)">${lose.length} / <span style="color:var(--color-text-warning)">${pending.length}</span></div></div>
  <div class="kpi"><div class="kpi-label">มูลค่าชนะ</div><div class="kpi-val" style="font-size:15px;color:var(--color-text-success)">${(winVal/1e6).toFixed(1)}M</div></div>
</div>
<div class="filter-row">
  <input type="text" id="fsearch" placeholder="ค้นหาเลขที่ / หน่วยงาน / จังหวัด..." oninput="render()">
  <select id="fmonth" onchange="render()">
    <option value="">ทุกเดือน</option>
    <option value="2568-12">ธ.ค. 68</option>
    <option value="2569-01">ม.ค. 69</option>
    <option value="2569-02">ก.พ. 69</option>
    <option value="2569-03">มี.ค. 69</option>
    <option value="2569-04">เม.ย. 69</option>
    <option value="2569-05">พ.ค. 69</option>
  </select>
  <button class="pill active" id="btn-all" onclick="setF('all')">ทั้งหมด (${bids.length})</button>
  <button class="pill" id="btn-win" onclick="setF('win')">ชนะ/สัญญา (${win.length})</button>
  <button class="pill" id="btn-lose" onclick="setF('lose')">แพ้ (${lose.length})</button>
  <button class="pill" id="btn-pending" onclick="setF('pending')">รอผล (${pending.length})</button>
</div>
<div class="tbl-wrap">
<table>
<thead><tr>
  <th>#</th><th>เลขที่โครงการ</th><th>วันที่</th><th>หน่วยงาน</th><th>จังหวัด</th>
  <th style="text-align:right">งบประมาณ</th><th style="text-align:right">ราคายื่น</th>
  <th style="text-align:right">%ลด</th><th>ห้าง</th><th>สถานะ</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div class="note">📦 ${bids.length} โครงการ · ข้อมูลราคากลางจาก govspending API · อัปเดต พ.ค. 69</div>`;
  render();
}

function setF(f){
  filter=f;
  ['all','win','lose','pending'].forEach(x=>{
    const el=document.getElementById('btn-'+x);
    if(el)el.className='pill'+(x===f?' active':'');
  });
  render();
}

function render(){
  const q=(document.getElementById('fsearch')||{value:''}).value.toLowerCase();
  const fm=(document.getElementById('fmonth')||{value:''}).value;
  const rows=bids.filter(b=>{
    if(filter==='win'&&!['win','contract','approved'].includes(b.status))return false;
    if(filter==='lose'&&b.status!=='lose')return false;
    if(filter==='pending'&&b.status!=='pending')return false;
    if(fm&&!b.date.startsWith(fm))return false;
    if(q&&!b.id.includes(q)&&!b.agency.toLowerCase().includes(q)&&!b.province.toLowerCase().includes(q))return false;
    return true;
  });
  const shortE=e=>e?e.replace('ห้างหุ้นส่วน ','').replace('กิจการร่วมค้า ','ร่วมค้า '):'-';
  document.getElementById('tbody').innerHTML=rows.map(b=>`
    <tr>
      <td style="color:var(--color-text-secondary);font-size:11px">${bids.indexOf(b)+1}</td>
      <td style="font-family:var(--font-mono);font-size:11px">${b.id}</td>
      <td style="font-size:11px">${dateDisplay(b.date)}</td>
      <td>${b.agency}</td>
      <td>${b.province}</td>
      <td style="text-align:right;color:var(--color-text-secondary)">${fmt(b.budget)}</td>
      <td style="text-align:right;font-weight:500">${fmt(b.bid)}</td>
      <td style="text-align:right">${pct(b.bid,b.budget)}</td>
      <td style="font-size:11px">${shortE(b.entity)}</td>
      <td>${STATUS_LABEL[b.status]||b.status}</td>
    </tr>`).join('');
}

init();
</script>
